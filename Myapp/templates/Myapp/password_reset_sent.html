{% extends "base.html" %}
{% block content %}
<section class="auth-wrap reveal-up">
  <div class="card panel-card auth-card shadow-sm">
    <div class="card-body p-4 p-md-5">
      <span class="hero-badge"><i class="bi bi-envelope-check"></i>E-POSTA GONDERİLDİ</span>
      <h1 class="mt-3 mb-2">Bağlantı Hazır</h1>
      <p class="text-muted mb-4">
        eğer bu e-posta adresiyle bir hesap varsa şifre sıfırlama bağlantısı gönderildi.
        Gelen kutusunu ve spam klasörünü kontrol edin.
      </p>
      <a href="{% url 'customer_login' %}" class="btn auth-submit-btn w-100">Giriş sayfasına dön</a>
    </div>
  </div>
</section>
{% endblock %}
